# This file was auto-generated by Antigravity.
# NOTE: GITHUB_TOKEN is provided automatically by GitHub, you DO NOT need to create it.
# You ONLY need to add FIREBASE_SERVICE_ACCOUNT_HANH_TIN_WEDDING to your GitHub repository secrets.

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
  workflow_dispatch: # Cho phép chạy thủ công từ giao diện GitHub
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: code
        run: npm ci

      - name: Build project
        working-directory: code
        run: npm run build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_HANH_TIN_WEDDING }}"
          channelId: live
          projectId: hanh-tin-wedding
          entryPoint: code
